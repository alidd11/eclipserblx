              }
            }

        },8000);
        // Cancel the timeout if React mounts successfully
        var o=new MutationObserver(function(){
          if(!document.getElementById('static-shell')){clearTimeout(t);o.disconnect()}
        });
        o.observe(document.getElementById('root'),{childList:true,subtree:true});
      }();
